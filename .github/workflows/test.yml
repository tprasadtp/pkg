name: test
on:
  push:
    tags:
      - "*"
    branches:
      - "*"
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          stable: true
          go-version: '^1.15.7'
      - name: Go Version
        run: |
          go version
      - name: go Test
        run: |
          go test -v ./...
